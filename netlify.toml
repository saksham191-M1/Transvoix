[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/static/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://transvoix-backend.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/ws/*"
  to = "https://transvoix-backend.onrender.com/ws/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/static/index.html"
  status = 200
