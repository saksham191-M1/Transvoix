[build]
  publish = "static"

[[redirects]]
  from = "/static/*"
  to = "/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "https://transvoix-backend.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/ws/*"
  to = "https://transvoix-backend.onrender.com/ws/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
